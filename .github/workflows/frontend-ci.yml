name: Frontend CI

on:
  push:
    branches: [ "main" ]
    paths-ignore:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    branches: [ "main" ]
    paths-ignore:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'
        flutter-version: '3.24.3'

    - name: Install dependencies
      run: flutter pub get

    - name: Format
      run: flutter format --set-exit-if-changed .

    - name: Analyze
      run: flutter analyze

    - name: Build Web
      run: flutter build web --release --dart-define=API_BASE_URL=https://api.furniflow.example.com/v1
